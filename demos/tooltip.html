<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Tooltip Component Demo</title>
        <style>
            /* Base styles for the tooltip container */
            .tooltip-container {
                position: relative;
                display: inline-block;
            }

            /* Base styles for the tooltip text */
            .tooltip-text {
                position: absolute;
                background-color: black;
                color: white;
                padding: 8px;
                border-radius: 4px;
                z-index: 1000;
                white-space: nowrap;
                opacity: 0;
                transition: opacity 0.3s;
                font-size: 0.875rem;
            }

            /* Show the tooltip */
            .tooltip-container:hover .tooltip-text,
            .tooltip-container:focus .tooltip-text {
                opacity: 1;
            }

            /* Tooltip positioning */
            /* Top */
            .tooltip-container .tooltip-text[position="top"] {
                bottom: 100%;
                left: 50%;
                transform: translateX(-50%);
                margin-bottom: 5px;
            }

            /* Right */
            .tooltip-container .tooltip-text[position="right"] {
                top: 50%;
                left: 100%;
                transform: translateY(-50%);
                margin-left: 5px;
            }

            /* Bottom */
            .tooltip-container .tooltip-text[position="bottom"] {
                top: 100%;
                left: 50%;
                transform: translateX(-50%);
                margin-top: 5px;
            }

            /* Left */
            .tooltip-container .tooltip-text[position="left"] {
                top: 50%;
                right: 100%;
                transform: translateY(-50%);
                margin-right: 5px;
            }

            .demo-div {
                margin-bottom: 1em;
            }

            .demo-container {
                display: flex;
                justify-content: center;
                align-items: center;
                height: 100vh;
            }
        </style>
    </head>
    <body>
        <div class="demo-container">
            <div id="root"></div>
        </div>

        <script
            crossorigin
            src="https://unpkg.com/react@17/umd/react.development.js"
        ></script>
        <script
            crossorigin
            src="https://unpkg.com/react-dom@17/umd/react-dom.development.js"
        ></script>
        <script
            crossorigin
            src="https://unpkg.com/prop-types/prop-types.js"
        ></script>
        <script
            crossorigin
            src="https://unpkg.com/@babel/standalone/babel.min.js"
        ></script>

        <script type="text/babel">
            const { useState, useRef, cloneElement, isValidElement } = React;

            const Tooltip = ({ children, text, position }) => {
    const [isVisible, setIsVisible] = useState(false);
    const tooltipRef = useRef(null);

    const showTooltip = () => setIsVisible(true);
    const hideTooltip = () => setIsVisible(false);

    const handleKeyPress = (e) => {
        if (e.key === "Escape") hideTooltip();
    };

    const enhanceChild = (child) => {
        if (isValidElement(child)) {
            return cloneElement(child, {
                onMouseEnter: showTooltip,
                onMouseLeave: hideTooltip,
                onFocus: showTooltip, // Show tooltip on focus
                onBlur: hideTooltip, // Hide tooltip on blur
                onKeyDown: handleKeyPress,
                tabIndex: 0,
                'aria-describedby': isVisible ? "tooltip-text" : undefined,
            });
        }
        return child;
    };

    return (
        <div className="tooltip-container">
            {enhanceChild(children)}
            {isVisible && (
                <div
                    className="tooltip-text"
                    role="tooltip"
                    id="tooltip-text"
                    ref={tooltipRef}
                    position={position}
                >
                    {text}
                </div>
            )}
        </div>
    );
};

Tooltip.propTypes = {
    children: PropTypes.node.isRequired,
    text: PropTypes.string.isRequired,
    position: PropTypes.oneOf(["top", "right", "bottom", "left"]),
};

Tooltip.defaultProps = {
    position: "top",
};

            const App = () => (
                <div>
                    <div className="demo-div">
                        <Tooltip text="Tooltip above" position="top">
                            <button>Hover over me (top)!</button>
                        </Tooltip>
                    </div>
                    <div className="demo-div">
                        <Tooltip text="Tooltip on the right" position="right">
                            <button>Hover over me (right)!</button>
                        </Tooltip>
                    </div>
                    <div className="demo-div">
                        <Tooltip text="Tooltip below" position="bottom">
                            <button>Hover over me (bottom)!</button>
                        </Tooltip>
                    </div>
                    <div className="demo-div">
                        <Tooltip text="Tooltip on the left" position="left">
                            <button>Hover over me (left)!</button>
                        </Tooltip>
                    </div>
                </div>
            );

            ReactDOM.render(<App />, document.getElementById("root"));
        </script>
    </body>
</html>
