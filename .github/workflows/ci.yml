name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [20, 22]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js ${{ matrix.node }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint (ESLint)
        run: npm run lint

      - name: Lint CSS (Stylelint)
        run: npm run stylelint

      - name: Format check (Prettier)
        run: npm run format:check

      - name: Lint markdown
        run: npm run markdownlint

      - name: Duplicate detection (jscpd)
        run: npm run dupes

      - name: License allowlist
        run: npm run license:check

      - name: npm audit (production, high+)
        run: npm run security:audit

      - name: Unit + accessibility tests
        run: npm test

      - name: Build library
        run: npm run build

      - name: Bundle size budget (size-limit)
        run: npm run size

      - name: Build Storybook
        run: npm run build-storybook

      - name: E2E tests (Puppeteer + Storybook static)
        run: npm run test:e2e
        env:
          # Puppeteer needs these flags in CI containers
          PUPPETEER_DISABLE_DEV_SHM_USAGE: "true"

  publish-storybook:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build-storybook
      - name: Upload Storybook to Pages
        uses: actions/upload-pages-artifact@v5
        with:
          path: storybook-static
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
